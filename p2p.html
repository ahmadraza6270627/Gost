<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gost — Relay Hub</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #040d12;
      color: #d8f0ec;
      font-family: Arial, sans-serif;
    }

    header {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid rgba(0, 220, 192, 0.18);
      background: #071820;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #00dcc0;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #8fcfc5;
    }

    .s-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #555;
    }

    .dot-idle {
      background: #777;
    }

    .dot-connecting,
    .dot-waiting {
      background: #ffaa44;
    }

    .dot-connected {
      background: #00dcc0;
      box-shadow: 0 0 10px #00dcc0;
    }

    .dot-error {
      background: #ff5566;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      padding: 16px;
      height: calc(100vh - 64px);
    }

    .panel {
      background: #071820;
      border: 1px solid rgba(0, 220, 192, 0.16);
      border-radius: 10px;
      overflow: hidden;
    }

    .chat {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topic-bar {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-bottom: 1px solid rgba(0, 220, 192, 0.12);
    }

    input {
      width: 100%;
      background: #030e14;
      border: 1px solid rgba(0, 220, 192, 0.18);
      color: #d8f0ec;
      border-radius: 8px;
      padding: 12px;
      outline: none;
    }

    input:focus {
      border-color: #00dcc0;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      background: #00dcc0;
      color: #03100e;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #end-button {
      background: #ff5566;
      color: white;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      font-family: monospace;
      font-size: 13px;
    }

    .log-line {
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }

    .log-time {
      color: #4a7a72;
      margin-right: 8px;
    }

    .log-info {
      color: #8fcfc5;
    }

    .log-success {
      color: #00dcc0;
    }

    .log-sent {
      color: #00aaff;
    }

    .log-received {
      color: #d8f0ec;
    }

    .log-error {
      color: #ff5566;
    }

    .log-warn {
      color: #ffaa44;
    }

    .message-bar {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid rgba(0, 220, 192, 0.12);
    }

    aside {
      padding: 14px;
    }

    .side-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #00dcc0;
      margin-bottom: 10px;
    }

    .chip {
      background: #030e14;
      border: 1px solid rgba(0, 220, 192, 0.12);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      color: #8fcfc5;
    }

    #topic-peers {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #topic-peers li {
      padding: 8px;
      border-bottom: 1px solid rgba(0, 220, 192, 0.08);
      font-family: monospace;
      font-size: 12px;
    }

    .empty {
      color: #4a7a72;
    }

    .peer-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #00dcc0;
      margin-right: 8px;
    }

    .meta {
      font-size: 12px;
      color: #4a7a72;
      margin-top: 10px;
    }

    @media (max-width: 800px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">GOST</div>

    <div class="status">
      <span class="s-dot dot-idle" id="status-dot"></span>
      <span id="status-text">Idle</span>
    </div>
  </header>

  <main>
    <section class="panel chat">
      <div class="topic-bar">
        <input id="topic-input" placeholder="Enter topic, e.g. global-chat" />
        <button id="subscribe-button">Connect</button>
        <button id="end-button" style="display:none;">Disconnect</button>
      </div>

      <div id="output">
        <div class="log-line log-info">
          <span class="log-time" id="init-time"></span>
          <span class="log-content">Ready. Enter topic and connect.</span>
        </div>
      </div>

      <div class="message-bar">
        <input id="message-input" placeholder="Type message..." disabled maxlength="500" />
        <button id="send-button" disabled>Send</button>
      </div>
    </section>

    <aside class="panel">
      <div class="side-title">Current Topic</div>
      <div class="chip" id="current-topic">—</div>

      <div class="side-title">Client ID</div>
      <div class="chip" id="peer-id" onclick="copyPeerId(this)">Initializing…</div>

      <div class="side-title">Online Clients</div>
      <ul id="topic-peers">
        <li class="empty">Subscribe first</li>
      </ul>

      <div class="meta">
        Mode: WebSocket Relay Hub<br />
        Transport: WSS/TLS<br />
        P2P dialing: disabled
      </div>
    </aside>
  </main>

  <script>
    const initTimeEl = document.getElementById('init-time')
    if (initTimeEl) {
      initTimeEl.textContent = new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      })
    }

    if (!sessionStorage.getItem('authToken')) {
      sessionStorage.clear()
      window.location.href = '/index.html'
    }

    let _realPeerId = ''

    window.setPeerId = function (fullId) {
      _realPeerId = fullId
      const chip = document.getElementById('peer-id')
      chip.textContent = fullId && fullId.length > 12
        ? fullId.slice(0, 6) + '…' + fullId.slice(-4)
        : fullId || 'Unknown'
    }

    function copyPeerId(el) {
      const toCopy = _realPeerId || el.textContent

      if (toCopy && toCopy !== 'Initializing…') {
        navigator.clipboard.writeText(toCopy).then(() => {
          const orig = el.textContent
          el.textContent = 'Copied!'
          setTimeout(() => {
            el.textContent = orig
          }, 1200)
        })
      }
    }

    window.addLog = function (text, type = 'info') {
      const outputEl = document.getElementById('output')

      const line = document.createElement('div')
      line.className = 'log-line log-' + type

      const t = document.createElement('span')
      t.className = 'log-time'
      t.textContent = new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
      })

      const c = document.createElement('span')
      c.className = 'log-content'
      c.textContent = text

      line.appendChild(t)
      line.appendChild(c)
      outputEl.appendChild(line)
      outputEl.scrollTop = outputEl.scrollHeight
    }

    window.setStatus = function (state, msg) {
      document.getElementById('status-text').textContent = msg
      document.getElementById('status-dot').className = 's-dot dot-' + (state || 'idle')
    }
  </script>

  <script type="module" src="./index.js"></script>
</body>
</html>
