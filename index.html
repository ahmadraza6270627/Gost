<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gost — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #040d12;
      --surface:      #071820;
      --surface2:     #0c2233;
      --surface3:     #103048;
      --border:       rgba(0,220,180,0.08);
      --border2:      rgba(0,220,180,0.15);
      --accent:       #00dcc0;
      --accent-dim:   #009f8c;
      --accent-glow:  rgba(0,220,192,0.15);
      --accent2:      #00aaff;
      --accent2-glow: rgba(0,170,255,0.12);
      --text:         #d8f0ec;
      --muted:        #4a7a72;
      --muted2:       #7ab0a8;
      --error:        #ff5566;
      --input-bg:     #030e14;
      --mono:         'IBM Plex Mono', monospace;
      --display:      'Syne', sans-serif;
      --body:         'Outfit', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Atmospheric background ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 100%, rgba(0,220,192,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 80% 0%, rgba(0,170,255,0.06) 0%, transparent 50%),
        radial-gradient(ellipse 100% 80% at 50% 50%, #040d12 0%, #020b10 100%);
    }

    /* Grid pattern */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,220,192,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,220,192,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 40%, transparent 100%);
    }

    /* Scanlines */
    .bg-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,220,192,0.008) 3px, rgba(0,220,192,0.008) 4px
      );
    }

    /* ── Layout ── */
    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: clamp(28px, 5vw, 48px) clamp(20px, 6vw, 44px) clamp(24px, 4vw, 36px);
      box-shadow:
        0 0 0 1px rgba(0,220,192,0.05),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(0,220,192,0.03),
        inset 0 1px 0 rgba(0,220,192,0.06);
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
      overflow: hidden;
    }

    /* Corner accents */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent2) 70%, transparent 100%);
      opacity: 0.6;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      background: radial-gradient(circle at 0 0, rgba(0,220,192,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Brand ── */
    .brand { margin-bottom: clamp(24px, 4vw, 36px); }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 6px;
    }

    .brand-mark {
      width: 40px; height: 40px;
      border: 1px solid rgba(0,220,192,0.3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,220,192,0.05);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .brand-mark::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,220,192,0.1) 0%, transparent 60%);
    }

    .brand-mark svg { width: 18px; height: 18px; fill: var(--accent); position: relative; z-index: 1; }

    .brand-name {
      font-family: var(--display);
      font-size: 26px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .brand-sub {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-left: 54px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-sub::before {
      content: '';
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
      margin-left: -12px;
    }

    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.2;} }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      margin-bottom: clamp(18px, 3vw, 28px);
      border-bottom: 1px solid var(--border);
      position: relative;
      background: rgba(0,220,192,0.02);
      border-radius: 4px 4px 0 0;
      overflow: hidden;
    }

    .tab-btn {
      flex: 1;
      padding: 11px 0 12px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: color 0.2s;
    }

    .tab-btn.active { color: var(--accent); }
    .tab-btn:not(.active):hover { color: var(--muted2); }

    .tab-bar {
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 50%;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .tabs[data-active="signup"] .tab-bar { transform: translateX(100%); }

    /* ── Panels ── */
    .panel { display: none; }
    .panel.active {
      display: block;
      animation: panelIn 0.25s ease both;
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Field ── */
    .field { margin-bottom: clamp(14px, 2.5vw, 18px); }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 400;
      color: var(--muted2);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: rgba(0,220,192,0.4);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Checkbox ── */
    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: clamp(16px, 3vw, 22px);
    }

    .check-row input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .check-row label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    /* ── Error ── */
    .error-msg {
      display: none;
      background: rgba(255,85,102,0.07);
      border: 1px solid rgba(255,85,102,0.2);
      border-radius: 4px;
      color: #ff7788;
      font-size: 11px;
      font-family: var(--mono);
      padding: 10px 14px;
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    .error-msg.show { display: block; animation: shake 0.3s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none;
      border-radius: 5px;
      color: #040d12;
      font-family: var(--display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn:hover { box-shadow: 0 6px 30px rgba(0,220,192,0.35); }
    .btn:hover::after { opacity: 1; }
    .btn:active { transform: scale(0.99); }
    .btn.loading { pointer-events: none; opacity: 0.5; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: clamp(14px, 3vw, 20px) 0 clamp(10px, 2vw, 16px);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer link ── */
    .foot {
      text-align: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .foot span {
      color: var(--accent);
      cursor: pointer;
      font-weight: 400;
      transition: color 0.15s;
    }

    .foot span:hover { color: var(--accent2); text-decoration: underline; }

    /* ── Security badge ── */
    .sec-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: clamp(20px, 4vw, 30px);
      padding-top: clamp(14px, 3vw, 20px);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .sec-badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: secPulse 3s ease-in-out infinite;
    }

    @keyframes secPulse { 0%,100%{opacity:1; box-shadow: 0 0 6px var(--accent);} 50%{opacity:0.3; box-shadow: none;} }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      html, body { overflow: auto; }
      .page { align-items: flex-start; padding: 20px 12px 40px; min-height: 100dvh; }
      .card { max-width: 100%; border-radius: 10px; }
    }

    @media (max-height: 600px) and (min-width: 481px) {
      .page { align-items: flex-start; overflow-y: auto; }
    }
  </style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="bg-lines"></div>

<div class="page">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-lockup">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 4l5 2.18V11c0 3.46-2.38 6.66-5 7.7C9.38 17.66 7 14.46 7 11V7.18L12 5zm-1 3v4h2V8h-2zm0 5v2h2v-2h-2z"/></svg>
        </div>
        <span class="brand-name">gost</span>
      </div>
      <div class="brand-sub">End-to-end encrypted messaging</div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="tabs" data-active="signin">
      <div class="tab-bar"></div>
      <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In Panel -->
    <div class="panel active" id="panel-signin">
      <div class="field">
        <label for="signin-email">Email Address</label>
        <input id="signin-email" type="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="signin-pass">Password</label>
        <input id="signin-pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="check-row">
        <input id="signin-check" type="checkbox" checked>
        <label for="signin-check">Keep me signed in</label>
      </div>
      <div class="error-msg" id="signin-error"></div>
      <button class="btn" id="signin-submit">Sign In</button>
      <div class="divider">or</div>
      <div class="foot">No account? <span onclick="switchTab('signup')">Create one free</span></div>
    </div>

    <!-- Sign Up Panel -->
    <div class="panel" id="panel-signup">
      <div class="field">
        <label for="signup-email">Email Address</label>
        <input id="signup-email" type="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="signup-username">Username</label>
        <input id="signup-username" type="text" placeholder="anonymous_user" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="signup-pass">Password</label>
        <input id="signup-pass" type="password" placeholder="••••••••" autocomplete="new-password" required>
      </div>
      <div class="error-msg" id="signup-error"></div>
      <button class="btn" id="signup-submit">Create Account</button>
      <div class="divider">or</div>
      <div class="foot">Already a member? <span onclick="switchTab('signin')">Sign in</span></div>
    </div>

    <!-- Security badge -->
    <div class="sec-badge">
      <div class="sec-badge-dot"></div>
      Messages are encrypted &amp; anonymous
    </div>

  </div>
</div>

<script>
  /* ── API base URL — kept out of view ── */
  const API = 'https://gost-production-e593.up.railway.app';
  const APP  = '/p2p.html';

  function switchTab(tab) {
    const tabs   = document.getElementById('tabs');
    const signin = document.getElementById('panel-signin');
    const signup = document.getElementById('panel-signup');
    const btns   = document.querySelectorAll('.tab-btn');
    tabs.dataset.active = tab;
    signin.classList.toggle('active', tab === 'signin');
    signup.classList.toggle('active', tab === 'signup');
    btns[0].classList.toggle('active', tab === 'signin');
    btns[1].classList.toggle('active', tab === 'signup');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError(id) {
    const el = document.getElementById(id);
    el.textContent = '';
    el.classList.remove('show');
  }

  document.addEventListener('DOMContentLoaded', function () {

    document.getElementById('signin-submit').addEventListener('click', async function () {
      clearError('signin-error');
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-pass').value;
      if (!email || !password) return showError('signin-error', 'Please fill in all fields.');

      this.textContent = 'Signing in…';
      this.classList.add('loading');

      try {
        const res = await fetch(`${API}/auth/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        if (res.ok) {
          const data = await res.json();
          sessionStorage.setItem('authToken', data.token);
          sessionStorage.setItem('username', data.username);
          window.location.href = APP;
        } else {
          const msg = await res.text();
          showError('signin-error', msg);
        }
      } catch (e) {
        showError('signin-error', 'Could not reach server. Is it running?');
      }

      this.textContent = 'Sign In';
      this.classList.remove('loading');
    });

    document.getElementById('signup-submit').addEventListener('click', async function () {
      clearError('signup-error');
      const email    = document.getElementById('signup-email').value.trim();
      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-pass').value;
      if (!email || !username || !password) return showError('signup-error', 'Please fill in all fields.');

      this.textContent = 'Creating account…';
      this.classList.add('loading');

      try {
        const res = await fetch(`${API}/user/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, username, password })
        });

        if (res.ok) {
          switchTab('signin');
          document.getElementById('signin-email').value = email;
        } else {
          const msg = await res.text();
          showError('signup-error', msg);
        }
      } catch (e) {
        showError('signup-error', 'Could not reach server. Is it running?');
      }

      this.textContent = 'Create Account';
      this.classList.remove('loading');
    });
  });
</script>

</body>
</html>
